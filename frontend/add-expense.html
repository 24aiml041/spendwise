<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Expense — Spendwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <main class="main">
    <div class="page-header">
      <div><h1 class="page-title">Add Expense</h1><p class="page-subtitle">Track a new purchase and how you feel about it.</p></div>
    </div>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group"><label>Amount (₹)</label><input type="number" id="expAmount" placeholder="0.00" min="0" step="0.01"></div>
        <div class="form-group"><label>Date</label><input type="date" id="expDate"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Category</label><select id="expCategory"><option value="">Select category</option></select></div>
        <div class="form-group"><label>Description</label><input type="text" id="expDescription" placeholder="What did you buy?"></div>
      </div>
      <div class="form-group">
        <label>How do you feel about this purchase?</label>
        <div class="feeling-selector">
          <div class="feeling-btn" id="feelHappy"   onclick="selectFeeling('happy')">  <span class="feeling-emoji">😊</span><span class="feeling-label">Happy</span></div>
          <div class="feeling-btn" id="feelNeutral" onclick="selectFeeling('neutral')"><span class="feeling-emoji">😐</span><span class="feeling-label">Neutral</span></div>
          <div class="feeling-btn" id="feelRegret"  onclick="selectFeeling('regret')"> <span class="feeling-emoji">😔</span><span class="feeling-label">Regret</span></div>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn btn-primary" id="saveBtn" style="flex:1;min-width:120px" onclick="saveExpense()">Save Expense</button>
        <button class="btn btn-ghost" style="flex:1;min-width:120px;width:auto" onclick="clearForm()">Clear</button>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="api.js"></script>
<script src="app.js"></script>
<script src="sidebar.js"></script>
<script>
if (!requireAuth()) throw new Error();
buildSidebar('add-expense');
initSidebar(Auth.getUser(), 'add-expense');
populateCategorySelect('expCategory');
document.getElementById('expDate').value = new Date().toISOString().split('T')[0];

let selectedFeeling = '';

function selectFeeling(f) {
  selectedFeeling = f;
  ['Happy','Neutral','Regret'].forEach(x => document.getElementById('feel'+x).className = 'feeling-btn');
  document.getElementById('feel' + f[0].toUpperCase() + f.slice(1)).className = 'feeling-btn selected-' + f;
}

async function saveExpense() {
  const amount      = parseFloat(document.getElementById('expAmount').value);
  const date        = document.getElementById('expDate').value;
  const category    = document.getElementById('expCategory').value;
  const description = document.getElementById('expDescription').value.trim();
  const btn         = document.getElementById('saveBtn');

  if (!amount || amount <= 0) { toast('Please enter a valid amount.', 'error'); return; }
  if (!date)                  { toast('Please select a date.', 'error'); return; }
  if (!category)              { toast('Please select a category.', 'error'); return; }
  if (!selectedFeeling)       { toast('Please select how you feel.', 'error'); return; }

  btn.textContent = 'Saving…'; btn.disabled = true;
  const res = await API.addExpense(amount, category, description, selectedFeeling, date);
  btn.textContent = 'Save Expense'; btn.disabled = false;

  if (!res.success) { toast(res.message, 'error'); return; }
  toast('Expense saved! 🎉', 'success');
  clearForm();
}

function clearForm() {
  document.getElementById('expAmount').value      = '';
  document.getElementById('expDate').value        = new Date().toISOString().split('T')[0];
  document.getElementById('expCategory').value    = '';
  document.getElementById('expDescription').value = '';
  selectedFeeling = '';
  ['Happy','Neutral','Regret'].forEach(x => document.getElementById('feel'+x).className = 'feeling-btn');
}
</script>
</body>
</html>
