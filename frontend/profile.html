<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Spendwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <main class="main">
    <div class="page-header"><div><h1 class="page-title">Profile</h1><p class="page-subtitle">Manage your account.</p></div></div>
    <div class="profile-grid">
      <div class="profile-card">
        <div class="profile-avatar-big" id="profileAvatarBig">J</div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
        <div class="profile-stat"><span class="profile-stat-label">Total Expenses</span><span class="profile-stat-val" id="profileTotalExp">0</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Total Spent</span><span class="profile-stat-val" id="profileTotalAmt">₹0</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Regret Rate</span><span class="profile-stat-val" id="profileRegretRate">0%</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Fav. Category</span><span class="profile-stat-val" id="profileFavCat">—</span></div>
        <div class="profile-stat"><span class="profile-stat-label">Member Since</span><span class="profile-stat-val" id="profileSince">—</span></div>
      </div>
      <div>
        <div class="form-card" style="margin-bottom:22px">
          <div style="font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:18px">Update Profile</div>
          <div class="form-group"><label>Full Name</label><input type="text" id="profileNameInput"></div>
          <div class="form-group"><label>Email</label><input type="email" id="profileEmailInput"></div>
          <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>
        </div>
        <div class="form-card">
          <div style="font-family:'Fraunces',serif;font-size:1.1rem;margin-bottom:18px">Change Password</div>
          <div class="form-group"><label>Current Password</label><input type="password" id="currPassword"></div>
          <div class="form-group"><label>New Password</label><input type="password" id="newPassword"></div>
          <div class="form-group"><label>Confirm New Password</label><input type="password" id="confirmPassword"></div>
          <button class="btn btn-primary" onclick="changePassword()">Change Password</button>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script src="api.js"></script>
<script src="app.js"></script>
<script src="sidebar.js"></script>
<script>
if (!requireAuth()) throw new Error();
buildSidebar('profile');
initSidebar(Auth.getUser(), 'profile');

async function loadProfile() {
  const [meRes, summaryRes, catRes] = await Promise.all([API.getMe(), API.getSummary(), API.getCategoryStats()]);
  if (!meRes.success) return;
  const u = meRes.user;
  const s = summaryRes.success ? summaryRes.summary : {};
  const cats = catRes.success ? catRes.categories : [];

  document.getElementById('profileAvatarBig').textContent = u.name[0].toUpperCase();
  document.getElementById('profileName').textContent = u.name;
  document.getElementById('profileEmail').textContent = u.email;
  document.getElementById('profileNameInput').value   = u.name;
  document.getElementById('profileEmailInput').value  = u.email;
  document.getElementById('profileSince').textContent = u.created_at ? new Date(u.created_at).toLocaleDateString('en-IN',{month:'short',year:'numeric'}) : '—';
  document.getElementById('profileTotalExp').textContent  = s.total_count || 0;
  document.getElementById('profileTotalAmt').textContent  = fmt(s.total_amount || 0);
  document.getElementById('profileRegretRate').textContent = (s.regret_percent || 0) + '%';
  document.getElementById('profileFavCat').textContent = cats[0]?.category || '—';
}

async function updateProfile() {
  const name  = document.getElementById('profileNameInput').value.trim();
  const email = document.getElementById('profileEmailInput').value.trim();
  if (!name || !email) { toast('Please fill in all fields.', 'error'); return; }
  const res = await API.updateProfile(name, email);
  if (!res.success) { toast(res.message, 'error'); return; }
  document.getElementById('sidebarName').textContent   = name;
  document.getElementById('sidebarEmail').textContent  = email;
  document.getElementById('sidebarAvatar').textContent = name[0].toUpperCase();
  toast('Profile updated! ✓', 'success');
  loadProfile();
}

async function changePassword() {
  const curr = document.getElementById('currPassword').value;
  const nw   = document.getElementById('newPassword').value;
  const cf   = document.getElementById('confirmPassword').value;
  if (!curr || !nw || !cf)  { toast('Please fill in all fields.', 'error'); return; }
  if (nw.length < 6)        { toast('New password must be at least 6 characters.', 'error'); return; }
  if (nw !== cf)            { toast('Passwords do not match.', 'error'); return; }
  const res = await API.changePassword(curr, nw);
  if (!res.success) { toast(res.message, 'error'); return; }
  ['currPassword','newPassword','confirmPassword'].forEach(id => document.getElementById(id).value = '');
  toast('Password changed! 🔒', 'success');
}
loadProfile();
</script>
</body>
</html>
