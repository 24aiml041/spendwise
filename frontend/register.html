<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Spendwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Spendwise<span class="logo-dot"></span></div>
    <div class="auth-tagline">Know what you spend. Feel what you spend.</div>
    <h2 class="auth-title">Create account</h2>
    <div id="signupError" class="error-msg" style="display:none"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Jane Doe"></div>
    <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters"></div>
    <button class="btn btn-primary" id="registerBtn" onclick="doSignup()">Create Account →</button>
    <div class="auth-switch">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>
<script src="api.js"></script>
<script>
  redirectIfLoggedIn();

  async function doSignup() {
    const name  = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pw    = document.getElementById('signupPassword').value;
    const err   = document.getElementById('signupError');
    const btn   = document.getElementById('registerBtn');

    if (!name || !email || !pw) { showErr(err, 'Please fill in all fields.'); return; }
    if (pw.length < 6)          { showErr(err, 'Password must be at least 6 characters.'); return; }

    btn.textContent = 'Creating…'; btn.disabled = true;
    const res = await API.register(name, email, pw);
    btn.textContent = 'Create Account →'; btn.disabled = false;

    if (!res.success) { showErr(err, res.message); return; }
    window.location.href = 'dashboard.html';
  }

  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doSignup(); });
</script>
</body>
</html>
