<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Spendwise</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Spendwise<span class="logo-dot"></span></div>
    <div class="auth-tagline">Know what you spend. Feel what you spend.</div>
    <h2 class="auth-title">Welcome back</h2>
    <div id="loginError" class="error-msg" style="display:none"></div>
    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign In →</button>
    <div class="auth-switch">Don't have an account? <a href="register.html">Create one</a></div>
  </div>
</div>
<script src="api.js"></script>
<script>
  redirectIfLoggedIn();

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPassword').value;
    const err   = document.getElementById('loginError');
    const btn   = document.getElementById('loginBtn');

    if (!email || !pw) { showErr(err, 'Please fill in all fields.'); return; }

    btn.textContent = 'Signing in…'; btn.disabled = true;
    const res = await API.login(email, pw);
    btn.textContent = 'Sign In →'; btn.disabled = false;

    if (!res.success) { showErr(err, res.message); return; }
    window.location.href = 'dashboard.html';
  }

  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
